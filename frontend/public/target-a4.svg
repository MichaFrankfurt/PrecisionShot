<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 297" width="210mm" height="297mm">
  <style>
    text { font-family: 'Helvetica Neue', Arial, sans-serif; }
    .ring-num { font-size: 3.5px; fill: #666; font-weight: 500; }
    .ring-num-white { font-size: 3.5px; fill: #fff; font-weight: 500; }
    .title { font-size: 6px; fill: #333; font-weight: 700; letter-spacing: 0.5px; }
    .subtitle { font-size: 3px; fill: #999; }
    .calibration { fill: #000; }
  </style>

  <!-- Background -->
  <rect width="210" height="297" fill="white"/>

  <!-- Calibration markers (4 corners) -->
  <circle cx="15" cy="15" r="3" class="calibration"/>
  <circle cx="195" cy="15" r="3" class="calibration"/>
  <circle cx="15" cy="282" r="3" class="calibration"/>
  <circle cx="195" cy="282" r="3" class="calibration"/>

  <!-- Target center at 105, 148.5 -->
  <!-- Ring width: 10mm, total diameter: 220mm (radius 110mm) -->

  <!-- Outer rings 1-6 (white background, gray ring lines) -->
  <circle cx="105" cy="148.5" r="110" fill="white" stroke="#ccc" stroke-width="0.3"/>
  <circle cx="105" cy="148.5" r="100" fill="none" stroke="#999" stroke-width="0.25"/>
  <circle cx="105" cy="148.5" r="90" fill="none" stroke="#999" stroke-width="0.25"/>
  <circle cx="105" cy="148.5" r="80" fill="none" stroke="#999" stroke-width="0.25"/>
  <circle cx="105" cy="148.5" r="70" fill="none" stroke="#999" stroke-width="0.25"/>
  <circle cx="105" cy="148.5" r="60" fill="none" stroke="#999" stroke-width="0.25"/>

  <!-- Spiegel: Ring 7-10 (black fill) -->
  <circle cx="105" cy="148.5" r="40" fill="#000"/>

  <!-- Ring lines inside Spiegel (white on black) -->
  <circle cx="105" cy="148.5" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.2"/>
  <circle cx="105" cy="148.5" r="20" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.2"/>

  <!-- Ring 10 (white circle inside black) -->
  <circle cx="105" cy="148.5" r="10" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="0.25"/>

  <!-- Innen-10 / Mouche (small white circle) -->
  <circle cx="105" cy="148.5" r="5" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="0.2"/>
  <circle cx="105" cy="148.5" r="1" fill="white"/>

  <!-- Ring numbers (top) -->
  <text x="105" y="40.5" text-anchor="middle" class="ring-num">1</text>
  <text x="105" y="50.5" text-anchor="middle" class="ring-num">2</text>
  <text x="105" y="60.5" text-anchor="middle" class="ring-num">3</text>
  <text x="105" y="70.5" text-anchor="middle" class="ring-num">4</text>
  <text x="105" y="80.5" text-anchor="middle" class="ring-num">5</text>
  <text x="105" y="90.5" text-anchor="middle" class="ring-num">6</text>
  <text x="105" y="110.5" text-anchor="middle" class="ring-num-white">7</text>
  <text x="105" y="120.5" text-anchor="middle" class="ring-num-white">8</text>
  <text x="105" y="130.5" text-anchor="middle" class="ring-num-white">9</text>

  <!-- Ring numbers (bottom) -->
  <text x="105" y="259" text-anchor="middle" class="ring-num">1</text>
  <text x="105" y="249" text-anchor="middle" class="ring-num">2</text>
  <text x="105" y="239" text-anchor="middle" class="ring-num">3</text>
  <text x="105" y="229" text-anchor="middle" class="ring-num">4</text>
  <text x="105" y="219" text-anchor="middle" class="ring-num">5</text>
  <text x="105" y="209" text-anchor="middle" class="ring-num">6</text>
  <text x="105" y="189" text-anchor="middle" class="ring-num-white">7</text>
  <text x="105" y="179" text-anchor="middle" class="ring-num-white">8</text>
  <text x="105" y="169" text-anchor="middle" class="ring-num-white">9</text>

  <!-- Ring numbers (left) -->
  <text x="0" y="150" text-anchor="middle" class="ring-num">1</text>
  <text x="10" y="150" text-anchor="middle" class="ring-num">2</text>
  <text x="20" y="150" text-anchor="middle" class="ring-num">3</text>
  <text x="30" y="150" text-anchor="middle" class="ring-num">4</text>
  <text x="40" y="150" text-anchor="middle" class="ring-num">5</text>
  <text x="50" y="150" text-anchor="middle" class="ring-num">6</text>
  <text x="67" y="150" text-anchor="middle" class="ring-num-white">7</text>
  <text x="77" y="150" text-anchor="middle" class="ring-num-white">8</text>
  <text x="87" y="150" text-anchor="middle" class="ring-num-white">9</text>

  <!-- Ring numbers (right) -->
  <text x="210" y="150" text-anchor="middle" class="ring-num">1</text>
  <text x="200" y="150" text-anchor="middle" class="ring-num">2</text>
  <text x="190" y="150" text-anchor="middle" class="ring-num">3</text>
  <text x="180" y="150" text-anchor="middle" class="ring-num">4</text>
  <text x="170" y="150" text-anchor="middle" class="ring-num">5</text>
  <text x="160" y="150" text-anchor="middle" class="ring-num">6</text>
  <text x="143" y="150" text-anchor="middle" class="ring-num-white">7</text>
  <text x="133" y="150" text-anchor="middle" class="ring-num-white">8</text>
  <text x="123" y="150" text-anchor="middle" class="ring-num-white">9</text>

  <!-- PrecisionShot Logo (top left) -->
  <g transform="translate(15, 265)">
    <!-- Target icon -->
    <circle cx="5" cy="5" r="4.5" fill="none" stroke="#333" stroke-width="0.4"/>
    <circle cx="5" cy="5" r="3" fill="none" stroke="#333" stroke-width="0.3"/>
    <circle cx="5" cy="5" r="1.5" fill="none" stroke="#333" stroke-width="0.2"/>
    <circle cx="5" cy="5" r="0.5" fill="#E31B23"/>
    <line x1="5" y1="0.5" x2="5" y2="3" stroke="#333" stroke-width="0.3"/>
    <line x1="5" y1="7" x2="5" y2="9.5" stroke="#333" stroke-width="0.3"/>
    <line x1="0.5" y1="5" x2="2" y2="5" stroke="#333" stroke-width="0.3"/>
    <line x1="7" y1="5" x2="9.5" y2="5" stroke="#333" stroke-width="0.3"/>
    <!-- P letter -->
    <text x="3.5" y="7" text-anchor="middle" fill="#333" font-size="4" font-weight="bold" font-family="sans-serif">P</text>
    <!-- Laser beam -->
    <line x1="0.5" y1="8" x2="4" y2="5" stroke="#E31B23" stroke-width="0.3"/>
  </g>

  <!-- Title -->
  <text x="30" y="270" class="title">PRECISION</text>
  <text x="58" y="270" class="title" fill="#E31B23">SHOT</text>
  <text x="73" y="270" style="font-size:3px;fill:#999">.ai</text>

  <!-- Info -->
  <text x="105" y="280" text-anchor="middle" class="subtitle">Kurzwaffen-Präzisionsscheibe · A4 · precisionshot.ai</text>
  <text x="105" y="284" text-anchor="middle" class="subtitle">Ring-Breite: 10mm · Innen-10: 10mm · Spiegel: 80mm</text>

  <!-- Ring 50 outer border (scoring area) -->
  <circle cx="105" cy="148.5" r="50" fill="none" stroke="#ddd" stroke-width="0.15"/>

  <!-- Crosshair lines (very subtle) -->
  <line x1="105" y1="38" x2="105" y2="108" stroke="#ddd" stroke-width="0.15"/>
  <line x1="105" y1="189" x2="105" y2="259" stroke="#ddd" stroke-width="0.15"/>
  <line x1="-5" y1="148.5" x2="65" y2="148.5" stroke="#ddd" stroke-width="0.15"/>
  <line x1="145" y1="148.5" x2="215" y2="148.5" stroke="#ddd" stroke-width="0.15"/>
</svg>
